# docker-compose.yml
version: '3.8'

services:
  # Redis 서비스
  redis:
    image: redis:latest
    container_name: redis-ticketing
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Redis Commander (Redis 관리 UI - 선택사항)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped

# 볼륨 정의
volumes:
  redis-data:
    driver: local